# ============================================================
# 内容处理配置 (Content Processing Configuration)
# ============================================================
# 控制网页内容的解析、分块和处理策略
# 基于 RAG 滑动窗口 (Sliding Window) 切分策略
# ============================================================

# --- 基础设置 ---

# 单页最大内容长度（字符数）：
# - 超过此长度的页面会被切分为多个 Chunk 处理
# - 影响 LLM 处理的 token 数量
# - 建议值：1000-5000，根据模型上下文窗口调整
max_content_length_per_page: 2000

# --- 滑动窗口切分策略 (Sliding Window Chunking) ---
# 用于解决语义截断问题，确保每个 Chunk 都保留上下文

# 块大小 (Chunk Size)：
# - 每个切片的目标长度（字符数）
# - 短文本 (300-500)：检索精度高，但可能丢失长程逻辑
# - 长文本 (800-1000+)：上下文丰富，但容易引入噪声
# - 平衡模式 (512)：推荐基准线，兼顾语义完整性和搜索效率
chunk_size: 512

# 重叠长度 (Chunk Overlap)：
# - 相邻两个 Chunk 之间重复的内容长度
# - 通常设置为 chunk_size 的 10%-25%
# - 高重叠：更好地保护跨块语义，但增加向量数据库冗余
# - 低重叠：减少冗余，但可能丢失边界信息
chunk_overlap: 128

# 分隔符策略 (Separator Strategy)：
# - 切分时的优先级标志列表
# - 系统会按顺序尝试每个分隔符，优先在语义边界处切分
# - 递归切分 (Recursive)：先按段落，再按句子，最后按字符
# - 推荐顺序：['\n\n', '\n', '。', '！', '？', '.', '!', '?', ' ']
separators:
  - "\n\n"    # 段落分隔（最高优先级）
  - "\n"      # 换行符
  - "。"      # 中文句号
  - "！"      # 中文感叹号
  - "？"      # 中文问号
  - "."       # 英文句号
  - "!"       # 英文感叹号
  - "?"       # 英文问号
  - " "       # 空格（最后备选）

# --- 切分模式 ---

# 切分模式：
# - "semantic": 语义切分（默认），优先在段落/句子边界切分
# - "markdown": Markdown 标题切分，按 # ## ### 等标题层级切分
# - "fixed": 固定长度切分，不考虑语义（不推荐）
chunking_mode: "semantic"

# --- 高级设置 ---

# 最大 Chunk 数量：
# - 单个页面最多切分为多少个块
# - 防止页面过大导致过多的 LLM 调用
max_chunks_per_page: 100

# 最小 Chunk 长度：
# - 低于此长度的内容不会单独成块，会合并到前一个块
# - 避免产生过小的无效块
min_chunk_length: 100

# --- 测试场景预设 ---
# 可以通过修改 chunk_size 和 chunk_overlap 来切换不同场景

# 精细检索模式：
# - chunk_size: 256
# - chunk_overlap: 64
# - 适合 FAQ 或短句，命中率极高，但 LLM 压力大

# 平衡模式（推荐）：
# - chunk_size: 512
# - chunk_overlap: 128
# - 兼顾语义完整性和搜索效率

# 长文档/法律模式：
# - chunk_size: 1024
# - chunk_overlap: 256
# - 适合理解复杂逻辑或长篇合同
