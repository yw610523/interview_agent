name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string
  
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.DEPLOYMENT_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set deployment variables
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "DEPLOY_VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_VERSION=${{ github.event.inputs.version || 'latest' }}" >> $GITHUB_ENV
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          fi
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_VERSION }}
      
      - name: Prepare deployment files
        run: |
          # Create deployment directory
          mkdir -p deploy-temp
          
          # Copy docker-compose and env template
          cp deploy/docker-compose.yml deploy-temp/
          cp .env.template deploy-temp/.env.example
          
          # Generate .env file from secrets
          cat > deploy-temp/.env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE=${{ secrets.OPENAI_API_BASE || 'https://api.openai.com/v1' }}
          REDIS_URL=redis://redis:6379
          SMTP_SERVER=${{ secrets.SMTP_SERVER || '' }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER || '' }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD || '' }}
          SITEMAP_URL=${{ secrets.SITEMAP_URL || '' }}
          EOF
      
      - name: Deploy via SSH
        uses: appleboy/scp-action@master
        if: ${{ vars.DEPLOY_HOST != '' }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || '22' }}
          source: "deploy-temp/*"
          target: "/opt/interview-agent"
      
      - name: Start services on remote server
        uses: appleboy/ssh-action@master
        if: ${{ vars.DEPLOY_HOST != '' }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || '22' }}
          script: |
            cd /opt/interview-agent/deploy-temp
            
            # Stop old containers
            docker-compose down || true
            
            # Update image in docker-compose.yml
            sed -i "s|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_VERSION }}|" docker-compose.yml
            
            # Start new containers
            docker-compose up -d
            
            # Wait for services to be healthy
            sleep 10
            
            # Check service status
            docker-compose ps
            
            # Clean up old images
            docker image prune -f
      
      - name: Verify deployment
        if: ${{ vars.DEPLOYMENT_URL != '' }}
        run: |
          echo "Waiting for application to start..."
          sleep 30
          
          # Check if application is responding
          curl -f ${{ vars.DEPLOYMENT_URL }}/docs || {
            echo "Application health check failed!"
            exit 1
          }
          
          echo "Deployment successful! Application is running at ${{ vars.DEPLOYMENT_URL }}"
      
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ env.DEPLOY_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          if [ "${{ vars.DEPLOYMENT_URL }}" != "" ]; then
            echo "- **URL**: ${{ vars.DEPLOYMENT_URL }}" >> $GITHUB_STEP_SUMMARY
          fi
