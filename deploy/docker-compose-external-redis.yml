version: '3.8'

services:
  # Interview Agent 应用（使用外置 Redis）
  app:
    build: .
    container_name: interview-agent
    ports:
      - "${APP_PORT:-80}:80"  # 前端访问端口
    env_file:
      - ../.env
    networks:
      - interview-network
    volumes:
      - ./crawl_results:/app/crawl_results
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  interview-network:
    driver: bridge
