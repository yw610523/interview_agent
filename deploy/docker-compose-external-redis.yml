version: '3.8'

services:
  # Firecrawl MCP 服务（用于动态网页渲染和解析）
  firecrawl:
    image: mendable/firecrawl:latest
    container_name: firecrawl-mcp
    ports:
      - "${FIRECRAWL_PORT:-3102}:3002"
    environment:
      - PORT=3002
      - NUM_WORKERS=${FIRECRAWL_WORKERS:-4}
    networks:
      - interview-network
    restart: unless-stopped
    # 如果需要代理支持，取消下面的注释并配置你的代理
    # environment:
    #   - ALL_PROXY=http://192.168.1.1:7890

  # Interview Agent 应用（使用外置 Redis）
  app:
    image: ghcr.io/yw610523/interview_agent:latest
    container_name: interview-agent
    ports:
      - "${APP_PORT:-9023}:9023"  # 前端访问端口
    env_file:
      - ../.env
    networks:
      - interview-network
    volumes:
      - ./crawl_results:/app/crawl_results
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9023/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  interview-network:
    driver: bridge
