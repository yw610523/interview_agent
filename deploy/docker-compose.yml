version: '3.8'

services:
  # Redis 服务（向量数据库）
  redis:
    image: redis/redis-stack:latest
    container_name: interview-redis
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
      - "8001:8001"  # RedisInsight
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    networks:
      - interview-network
    restart: unless-stopped

  # Interview Agent 应用
  app:
    image: ghcr.io/yw610523/interview_agent:latest
    container_name: interview-agent
    ports:
      - "${APP_PORT:-9023}:9023"  # 前端访问端口
    depends_on:
      - redis
    networks:
      - interview-network
    volumes:
      - ./crawl_results:/app/crawl_results
      # 配置文件映射（只读）- 支持多文件配置
      - ../config/crawler.yaml:/app/config/crawler.yaml:ro
      - ../config/llm.yaml:/app/config/llm.yaml:ro
      - ../config/smtp.yaml:/app/config/smtp.yaml:ro
      - ../config/redis.yaml:/app/config/redis.yaml:ro
      - ../config/firecrawl.yaml:/app/config/firecrawl.yaml:ro
      - ../config/rerank.yaml:/app/config/rerank.yaml:ro
      - ../config/content.yaml:/app/config/content.yaml:ro
      - ../config/prompts.yaml:/app/config/prompts.yaml:ro
      - ../config/service.yaml:/app/config/service.yaml:ro
    environment:
      # Redis 配置
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # LLM 配置
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - RERANK_API_BASE=${RERANK_API_BASE:-}
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_MODEL=${RERANK_MODEL:-}
      
      # Firecrawl 配置
      - FIRECRAWL_ENABLED=${FIRECRAWL_ENABLED:-false}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - FIRECRAWL_TIMEOUT=${FIRECRAWL_TIMEOUT:-60}
      - USE_OFFICIAL_FIRECRAWL=${USE_OFFICIAL_FIRECRAWL:-false}
      - FIRECRAWL_ONLY_MAIN_CONTENT=${FIRECRAWL_ONLY_MAIN_CONTENT:-true}
      
      # SMTP 配置
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9023/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  interview-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
