version: '3.8'

services:
  # Interview Agent 应用（使用外置 Redis）
  app:
    image: ghcr.io/yw610523/interview_agent:latest
    container_name: interview-agent
    ports:
      - "${APP_PORT:-9023}:9023"  # 前端访问端口
    env_file:
      - ../.env
    networks:
      - interview-network
    volumes:
      - ./crawl_results:/app/crawl_results
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9023/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  interview-network:
    driver: bridge
