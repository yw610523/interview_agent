name: CI Pipeline

on:
  workflow_dispatch:  # 仅手动触发
  # push:
  #   branches: [ main, develop ]
  # pull_request:
  #   branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 app/ tests/ --max-line-length=120 --ignore=E203,W503 --count --statistics

      - name: Check code formatting with black
        run: |
          black --check app/ tests/ || echo "Code formatting issues found"
  
  # 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov httpx

      - name: Create config files for tests
        run: |
          mkdir -p config
          # 创建最小化的测试配置
          cat > config/redis.yaml << EOF
          url: redis://localhost:6379
          EOF
          cat > config/llm.yaml << EOF
          openai_api_key: test-key
          openai_api_base: https://api.test.com
          model: test-model
          embedding_model: test-embedding
          embedding_dimension: 1536
          max_input_tokens: 128000
          max_output_tokens: 16384
          EOF
          cat > config/crawler.yaml << EOF
          sitemap_url: "http://test.com"
          timeout: 30
          max_urls: null
          delay_between_requests: 0.5
          output_dir: ./crawl_results
          user_agent: "TestAgent"
          url_include_patterns: []
          url_exclude_patterns: []
          scheduler:
            hour: 22
            minute: 0
          EOF
          cat > config/smtp.yaml << EOF
          server: smtp.test.com
          port: 587
          user: test@test.com
          password: test
          test_user: test@test.com
          EOF
          cat > config/rerank.yaml << EOF
          enabled: false
          model: test-rerank
          EOF
          cat > config/firecrawl.yaml << EOF
          enabled: false
          EOF
          cat > config/prompts.yaml << EOF
          question_extraction_system: "test prompt"
          answer_generation_system: "test prompt"
          EOF
          cat > config/content.yaml << EOF
          max_content_length_per_page: 2000
          EOF
          cat > config/service.yaml << EOF
          app_port: 9023
          EOF

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
  
  # 前端构建
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
  
  # Docker 镜像构建
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ test, frontend-build ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: interview-agent:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm interview-agent:test python --version
          docker run --rm interview-agent:test pip list

