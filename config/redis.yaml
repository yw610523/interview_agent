# ============================================================
# Redis 配置
# ============================================================
# Redis 数据库连接信息，用于向量存储和缓存
# ============================================================

# Redis 服务器地址（容器内部使用）：通过 Docker 网络通信时使用容器名
host: ${REDIS_HOST:-redis}

# Redis 服务器端口（容器内部使用）：容器间通信始终使用 6379
port: ${REDIS_PORT:-6379}

# Redis 密码：认证令牌（留空表示无需密码）
password: ${REDIS_PASSWORD:-}
