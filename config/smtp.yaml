# ============================================================
# SMTP 邮件配置
# ============================================================
# 用于发送系统通知、报告等电子邮件
# ============================================================

# SMTP 服务器地址：邮件服务提供商的 SMTP 主机
# 示例：smtp.qq.com, smtp.163.com, smtp.gmail.com
server: ${SMTP_SERVER:-smtp.qq.com}

# SMTP 服务器端口：
# - 25: 标准 SMTP 端口（明文）
# - 465: SSL 加密端口
# - 587: TLS 加密端口（推荐）
port: ${SMTP_PORT:-587}

# 发件人邮箱账号：用于发送邮件的邮箱地址
user: ${SMTP_USER:-}

# 邮箱密码或授权码：
# ⚠️ 注意：QQ/163 等邮箱需使用授权码，而非登录密码
password: ${SMTP_PASSWORD:-}
