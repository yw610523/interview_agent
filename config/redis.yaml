# ============================================================
# Redis 配置
# ============================================================
# Redis 数据库连接信息，用于向量存储和缓存
# ============================================================

# Redis 服务器地址：主机名或 IP 地址
host: ${REDIS_HOST:-localhost}

# Redis 服务器端口：默认 6379
port: ${REDIS_PORT:-6379}

# Redis 密码：认证令牌（留空表示无需密码）
password: ${REDIS_PASSWORD:-}
