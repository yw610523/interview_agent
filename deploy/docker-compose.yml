version: '3.8'

services:
  # Redis 服务（向量数据库）
  # 如果使用外置 Redis，请注释掉整个 redis 服务块
  redis:
    image: redis/redis-stack:latest
    container_name: interview-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8001}:8001"  # RedisInsight
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    networks:
      - interview-network
    restart: unless-stopped

  # Interview Agent 应用
  app:
    build: .
    container_name: interview-agent
    ports:
      - "${APP_PORT:-80}:80"  # 前端访问端口
    env_file:
      - ../.env
    # 如果使用外置 Redis，请注释掉下面这行
    depends_on:
      - redis
    networks:
      - interview-network
    volumes:
      - ./crawl_results:/app/crawl_results
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  interview-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
