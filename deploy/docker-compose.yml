version: '3.8'

services:
  # Redis 服务（向量数据库）
  redis:
    image: redis/redis-stack:latest
    container_name: interview-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    networks:
      - interview-network
    restart: unless-stopped

  # Interview Agent 应用
  app:
    build: .
    container_name: interview-agent
    ports:
      - "80:80"  # 前端访问端口
    environment:
      # SMTP 配置
      - SMTP_SERVER=${SMTP_SERVER:-smtp.qq.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_TEST_USER=${SMTP_TEST_USER}
      
      # OpenAI 配置
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      
      # Redis 配置（使用容器内 Redis）
      - REDIS_URL=redis://redis:6379
      
      # 爬虫配置
      - SITEMAP_URL=${SITEMAP_URL}
      - CRAWLER_TIMEOUT=${CRAWLER_TIMEOUT:-30}
      - CRAWLER_MAX_URLS=${CRAWLER_MAX_URLS}
      - CRAWLER_DELAY=${CRAWLER_DELAY:-0.5}
      - CRAWLER_OUTPUT_DIR=${CRAWLER_OUTPUT_DIR:-./crawl_results}
      - CRAWLER_USER_AGENT=${CRAWLER_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36}
      
      # 定时任务配置
      - SCHEDULER_HOUR=${SCHEDULER_HOUR:-22}
      - SCHEDULER_MINUTE=${SCHEDULER_MINUTE:-0}
      
      # LLM 配置
      - MAX_CONTENT_LENGTH_PER_PAGE=${MAX_CONTENT_LENGTH_PER_PAGE:-2000}
      - MODEL_MAX_INPUT_TOKENS=${MODEL_MAX_INPUT_TOKENS:-128000}
      - MODEL_MAX_OUTPUT_TOKENS=${MODEL_MAX_OUTPUT_TOKENS:-16384}
    depends_on:
      - redis
    networks:
      - interview-network
    volumes:
      - ./crawl_results:/app/crawl_results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  interview-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
