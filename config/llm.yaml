# ============================================================
# LLM (大语言模型) 配置
# ============================================================
# 用于生成面试题、答案和智能问答
# 支持 OpenAI 兼容 API（OpenAI、Qwen、DeepSeek 等）
# ============================================================

openai:
  # API 密钥：认证令牌
  # 从服务商获取（如 OpenAI、SiliconFlow、阿里云等）
  api_key: ${OPENAI_API_KEY:-}
  
  # API 基础 URL：服务端点
  # - OpenAI: https://api.openai.com/v1
  # - SiliconFlow: https://api.siliconflow.cn/v1
  # - 阿里云: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_base: ${OPENAI_API_BASE:-}
  
  # 聊天模型名称：用于生成文本的模型
  # - gpt-4o-mini: OpenAI 高性价比模型
  # - qwen-plus: 阿里通义千问
  # - deepseek-chat: DeepSeek 对话模型
  model: ${OPENAI_MODEL:-deepseek-chat}
  
  # 最大输入 Token 数：单次请求的最大上下文长度
  # 根据模型能力设置，过大可能导致截断
  max_input_tokens: 128000
  
  # 最大输出 Token 数：模型生成的最大长度
  # 影响答案的详细程度
  max_output_tokens: 16384


# ============================================================
# Embedding (向量嵌入) 配置
# ============================================================
# 用于将文本转换为向量，支持语义搜索
# 存储在 Redis 向量数据库中
# ============================================================

embedding:
  # API 基础 URL：嵌入服务的端点
  # 如果留空，则复用 openai.api_base
  api_base: ${EMBEDDING_API_BASE:-https://api.siliconflow.cn/v1}
  
  # API 密钥：如果留空，则复用 openai.api_key
  api_key: ${EMBEDDING_API_KEY:-}
  
  # 嵌入模型名称：文本转向量的模型
  # - text-embedding-3-small: OpenAI 小型模型（1536维）
  # - text-embedding-3-large: OpenAI 大型模型（3072维）
  # - bge-m3: BAAI 多语言模型（1024维）
  model: ${EMBEDDING_MODEL:-BAAI/bge-m3}
  
  # 向量维度：嵌入向量的维度数
  # 必须与 embedding.model 匹配：
  # - text-embedding-3-small: 1536
  # - text-embedding-3-large: 3072
  # - bge-m3: 1024
  dimension: ${EMBEDDING_DIMENSION:-1536}


# ============================================================
# Rerank (重排序) 配置
# ============================================================
# 对向量搜索结果进行二次排序，提高相关性
# 可选功能，启用后会增加响应时间但提升精度
# ============================================================

rerank:
  # 是否启用 Rerank 功能
  # true: 对搜索结果重排序（推荐，提高精度）
  # false: 直接使用向量相似度排序（更快）
  enabled: ${RERANK_ENABLED:-false}
  
  # API 基础 URL：重排序服务的端点
  api_base: ${RERANK_API_BASE:-https://api.siliconflow.cn/v1}
  
  # API 密钥：如果留空，则复用 openai.api_key
  api_key: ${RERANK_API_KEY:-}
  
  # Rerank 模型名称：重排序使用的模型
  # - BAAI/bge-reranker-base: 基础版，速度快
  # - BAAI/bge-reranker-large: 大型版，精度高
  # - BAAI/bge-reranker-v2-m3: 多语言版本
  model: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
